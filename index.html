<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Intelligence Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="./styles/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Location Intelligence Dashboard</h1>
      <p class="subtitle">City view with drilldown into offices and optional overlays.</p>
    </div>

    <div class="actions">
      <button id="cityBtn" type="button" class="btn btn-secondary btn-pill">City</button>
      <button id="resetBtn" type="button" class="btn btn-secondary btn-pill">Reset</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div id="detailsPanel" class="details-panel"></div>
    </aside>

    <section class="map-shell">
      <div class="map-toolbar">
        <div id="overlayControls" class="overlay-controls" aria-live="polite"></div>
      </div>
      <div id="map"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
