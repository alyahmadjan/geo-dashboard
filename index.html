<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geospatial Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="./styles/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Geospatial Dashboard</h1>
      <p class="subtitle">City and office drill-down with a data layer ready for API integration.</p>
    </div>

    <div class="actions">
      <div id="layerControls" class="segmented" aria-label="Layer controls">
        <button type="button" class="segmented-btn active" data-layer="city">City layer</button>
        <button type="button" class="segmented-btn" data-layer="office">Office layer</button>
      </div>
      <button id="resetBtn" type="button" class="btn btn-secondary">Reset</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div id="detailsPanel" class="details-panel"></div>
    </aside>

    <section class="map-shell">
      <div id="map"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
